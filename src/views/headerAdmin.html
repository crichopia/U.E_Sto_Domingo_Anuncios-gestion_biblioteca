<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            box-sizing: border-box;
            font-size: 18px;
            

        }
        header {
            box-sizing: border-box;
            background: linear-gradient(135deg, #51e070, #009774);
            width:                       100%; 
            height:                      15vh;
            color:                    white;
            padding-bottom: 15px;
            padding-left:10px;
            padding-right:10px;
            text-align:                center;
            display:                     grid;
            place-items:               center;
            grid-template-columns:1fr 1fr 1fr;
            @media (max-width: 600px){
                font-size:      14px;
                height:         12vh;
                padding-bottom: 10px;
                
            }
            
        }
    
        #logo {
            width: 50px;
            height:50px;
            display:flex;
            align-items: center;
            justify-content: center;
            background-color: white;
            border-radius: 100%;
        }

        #logo_menu{
            display:grid;
            place-items: center;
            grid-template-columns: 1fr 1fr;
            gap: 3vw;
        }

        #rayas{
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 5px;
        }

        .raya{
            width :60px;
            height: 10px;
            border-radius: 5px;
            background-color: rgb(255, 255, 255);
        }

        #rayas:hover{
            .raya{
            
                background-color: rgb(193, 255, 230);
                box-shadow: 0px 0px 10px rgb(163, 255, 224);
            
            }
        }

        #admin-btn{
            background: linear-gradient(135deg, #51e070, #009774);
            border: 2px #8abfb7 solid;
            border-radius: 25px;
            color: white;
            padding: 1vh 2vw;
            font-size: 18px;
            margin: 0px;
            @media (max-width: 600px){
                font-size:      14px;
            }
        }

        #admin-btn:hover{
            background: linear-gradient(135deg, #36b565, #00807b);
        }
    </style>

</head>

<body>
    <header>
        <div id="logo_menu">

            <div onclick="alert('work in progress')" id="rayas">
                <div class="raya"></div>
                <div class="raya"></div>
                <div class="raya"></div>
            </div>
            <div id="logo"></div>
        </div>

        </div>

        <h1>U.E Sto Domingo</h1>
        <button id="admin-btn" onclick="logout()">Logout</button>
    </header>

    <script src="controllers/modal_controller.js"></script>

</body>

</html>
